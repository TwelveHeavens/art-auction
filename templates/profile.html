{% extends "base.html" %}

{% block content %}
<div class="d-flex flex-column align-items-center mb-5">
  <!-- Круглое фото -->
  <div class="mb-4">
    {% if profile.profile_image %}
      <img src="{{ url_for('static', filename='uploads/' + profile.profile_image) }}"
           class="rounded-circle border border-3 border-light shadow"
           alt="Аватар"
           width="150"
           height="150"
           style="object-fit: cover;">
    {% else %}
      <div class="rounded-circle bg-light d-flex align-items-center justify-content-center border border-3 border-light shadow"
           style="width: 150px; height: 150px;">
        <i class="bi bi-person text-muted" style="font-size: 4rem;"></i>
      </div>
    {% endif %}
  </div>

  <!-- Имя пользователя -->
  <h2 class="mb-2">{{ current_user.username }}</h2>

  <!-- Статистика -->
  <div class="d-flex gap-4 mb-4 text-center">
    <div>
      <div class="fw-bold fs-4">{{ lots_created }}</div>
      <small class="text-muted">Лотов</small>
    </div>
    <div>
      <div class="fw-bold fs-4">{{ bids_made }}</div>
      <small class="text-muted">Ставок</small>
    </div>
    <div>
      <div class="fw-bold fs-4">{{ lots_won }}</div>
      <small class="text-muted">Побед</small>
    </div>
  </div>

  <!-- Биография -->
  {% if profile.bio %}
    <div class="text-muted mb-4" style="max-width: 600px; text-align: center;">
      {{ profile.bio }}
    </div>
  {% endif %}

  <!-- Кнопки действий -->
  <div class="d-flex gap-2">
    <a href="{{ url_for('edit_profile') }}" class="btn btn-outline-primary">
      <i class="bi bi-pencil me-1"></i>Редактировать профиль
    </a>
    <a href="{{ url_for('my_auctions') }}" class="btn btn-outline-secondary">
      Мои лоты
    </a>
  </div>
</div>
{% endblock %}
